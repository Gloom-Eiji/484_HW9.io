<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Little Computer Science Amateur</title>
  <link rel="stylesheet" href="css/title.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet">
</head>
<body>
  <div class="scanlines"></div>
  <div class="crt-overlay"></div>

  <!-- Pixel ambient background canvas (replaces floating emoji decorations) -->
  <canvas class="ambient-canvas" id="ambientCanvas"></canvas>

  <div class="title-screen">

    <div class="title-container">
      <div class="title-badge">TAMAGOTCHI-STYLE SIM</div>

      <h1 class="game-title">
        <span class="title-line1">My Little</span>
        <span class="title-line2">Computer Science</span>
        <span class="title-line3">Amateur</span>
      </h1>

      <div class="title-sprite-wrapper">
        <img src="assets/sprites/EJ_idle.png" alt="CS Student" class="title-sprite" id="titleSprite" />
        <div class="sprite-shadow"></div>
        <div class="speech-bubble" id="speechBubble">
          <span id="speechText">why won't it compile...</span>
        </div>
      </div>

      <button class="start-btn" id="startBtn" onclick="startGame()">
        <span class="btn-text">▶ START GAME</span>
        <span class="btn-blink">_</span>
      </button>

      <p class="press-start-hint blink">PRESS START TO ADOPT YOUR CS STUDENT</p>

      <div class="bottom-credits">
        <span>v1.0.0</span>
        <span>•</span>
        <span>COMP 484 EDITION</span>
        <span>•</span>
        <span>© 2025</span>
      </div>
    </div>
  </div>

  <script src="js/title.js"></script>
</body>
</html>
