<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Little CS Amateur – Game</title>
  <link rel="stylesheet" href="css/game.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet">
</head>
<body>

  <div class="scanlines"></div>

  <!-- TOP HUD -->
  <header class="hud-bar">
    <div class="hud-left">
      <span class="hud-title">📟 CS STUDENT SIM</span>
    </div>
    <div class="hud-stats">
      <div class="stat-block" id="statHunger">
        <span class="stat-label">HUNGER</span>
        <div class="stat-bar"><div class="stat-fill hunger-fill" id="hungerBar"></div></div>
      </div>
      <div class="stat-block" id="statThirst">
        <span class="stat-label">THIRST</span>
        <div class="stat-bar"><div class="stat-fill thirst-fill" id="thirstBar"></div></div>
      </div>
      <div class="stat-block" id="statEnergy">
        <span class="stat-label">ENERGY</span>
        <div class="stat-bar"><div class="stat-fill energy-fill" id="energyBar"></div></div>
      </div>
      <div class="stat-block" id="statMood">
        <span class="stat-label">MOOD</span>
        <div class="stat-bar"><div class="stat-fill mood-fill" id="moodBar"></div></div>
      </div>
    </div>
    <div class="hud-right">
      <span class="hud-clock" id="gameClock">00:00</span>
    </div>
  </header>

  <!-- MAIN GAME WORLD -->
  <main class="game-world" id="gameWorld">

    <!-- Background image fills the room (assets/sprites/BG.png) -->
    <div class="room-bg"></div>

    <!-- Animated window overlay (positioned over the window in BG.png) -->
    <div class="window-overlay">
      <div class="window-sky">
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        <div class="cloud c3"></div>
        <div class="city-lights"></div>
      </div>
    </div>

    <!-- Fridge zone — pet walks here for eat action -->
    <div class="fridge-zone" id="fridgeZone" title="Open Fridge">
      <div class="fridge-glow"></div>
      <div class="interact-hint" id="fridgeHint">EAT</div>
    </div>

    <!-- PC zone — pet walks here for code AND gaming actions -->
    <div class="pc-zone" id="pcZone" title="Use PC">
      <div class="pc-glow"></div>
      <div class="interact-hint" id="pcHint">PC</div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="speech-bubble-game" id="gameSpeech">
      <span id="gameSpeechText">...</span>
    </div>

    <!-- THE PET CHARACTER -->
    <div class="pet-container" id="petContainer">
      <img
        src="assets/sprites/EJ_idle.png"
        alt="CS Student Pet"
        class="pet-sprite"
        id="petSprite"
        draggable="false"
      />
      <div class="pet-shadow" id="petShadow"></div>
    </div>

    <div class="zzz-effect" id="zzzEffect"><span>z</span><span>z</span><span>Z</span></div>
    <div class="sweat-effect" id="sweatEffect">💦</div>
    <div class="hearts-effect" id="heartsEffect"><span>💙</span><span>💙</span><span>💙</span></div>

    <canvas class="pixel-particles" id="pixelCanvas"></canvas>

  </main>

  <!-- BOTTOM ACTION BUTTONS — 7 buttons, job app is wider -->
  <footer class="action-bar">
    <div class="action-grid">

      <button class="action-btn" id="btnFeed" onclick="petAction('eat')">
        <span class="btn-icon">🍕</span>
        <span class="btn-label">FEED</span>
      </button>

      <button class="action-btn" id="btnDrink" onclick="petAction('drink')">
        <span class="btn-icon">🧃</span>
        <span class="btn-label">DRINK</span>
      </button>

      <button class="action-btn" id="btnCode" onclick="petAction('code')">
        <span class="btn-icon">💻</span>
        <span class="btn-label">CODE</span>
      </button>

      <!-- Gaming: separate from code, improves mood -->
      <button class="action-btn gaming-btn" id="btnGame" onclick="petAction('gaming')">
        <span class="btn-icon">🎮</span>
        <span class="btn-label">GAME</span>
      </button>

      <button class="action-btn" id="btnWorkout" onclick="petAction('workout')">
        <span class="btn-icon">🏋️</span>
        <span class="btn-label">WORKOUT</span>
      </button>

      <button class="action-btn" id="btnSleep" onclick="petAction('sleep')">
        <span class="btn-icon">😴</span>
        <span class="btn-label">SLEEP</span>
      </button>

      <!-- Danger: job app — wider and scarier -->
      <button class="action-btn danger-btn job-btn" id="btnScare" onclick="petAction('scared')">
        <span class="btn-icon">📋</span>
        <span class="btn-label">JOB APP</span>
      </button>

    </div>
  </footer>

  <!-- STATUS OVERLAY -->
  <div class="status-overlay" id="statusOverlay" style="display:none;">
    <div class="overlay-content">
      <p id="overlayMessage">💤 CS Student is sleeping...</p>
      <button onclick="dismissOverlay()" class="overlay-btn">WAKE UP</button>
    </div>
  </div>

  <script src="js/game.js"></script>
</body>
</html>
